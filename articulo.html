<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El gran desequilibrio económico</title>
    
    <script src="https://cdn.jsdelivr.net/npm/vega@5"></script>
    <script src="https://cdn.jsdelivr.net/npm/vega-lite@5"></script>
    <script src="https://cdn.jsdelivr.net/npm/vega-embed@6"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000000;
            color: #f5f5f5;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
        }

        #sbsr-1475 {
            max-width: 1100px;
            width: 100%;
            margin: 0 auto;
            padding: 60px 20px;
        }

        #sbsr-1475 .cs-container {
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 50px;
        }

        #sbsr-1475 .cs-image-group {
            flex: 1;
            width: 100%;
            display: flex;
            justify-content: center;
        }

        #sbsr-1475 .cs-picture img {
            width: 100%;
            max-width: 450px;
            height: auto;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.7);
            object-fit: cover;
            display: block;
        }

        #sbsr-1475 .cs-content {
            flex: 1;
            width: 100%;
        }

        #sbsr-1475 .cs-title {
            font-size: 2.5rem;
            font-weight: 900;
            text-transform: uppercase;
            color: #2ecc71;
            background: linear-gradient(180deg, #39ff14 0%, #2ecc71 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
            margin-bottom: 24px;
            letter-spacing: 1px;
            line-height: 1.2;
        }

        #reviews-306 {
            position: relative;
            background-image: linear-gradient(rgba(0, 0, 0, 0.40), rgba(0, 0, 0, 0.40)), 
                              url('imagenes/cancha_futbol.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            padding: 80px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .reviews-container {
            max-width: 1200px;
            width: 100%;
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            gap: 50px;
            margin: 0 auto;
        }

        #reviews-306 .cs-image {
            max-width: 700px;
            width: 100%;
            display: block;
        }

        #reviews-306 .cs-image img {
            width: 100%;
            height: auto;
            border: 4px solid #39ff14;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.8);
            object-fit: cover;
            display: block;
        }

        #stability-section {
            max-width: 1100px;
            width: 100%;
            margin: 0 auto;
            padding: 80px 20px;
        }

        #stability-section .cs-container {
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 50px;
        }

        #stability-section .cs-image-group {
            flex: 1;
            width: 100%;
            display: flex;
            justify-content: center;
        }

        #stability-section .cs-picture img {
            width: 100%;
            max-width: 450px;
            height: auto;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.7);
            object-fit: cover;
            display: block;
        }

        #stability-section .cs-content {
            flex: 1;
            width: 100%;
        }

        #stability-section .cs-title {
            font-size: 2.5rem;
            font-weight: 900;
            text-transform: uppercase;
            color: #2ecc71;
            background: linear-gradient(180deg, #39ff14 0%, #2ecc71 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
            margin-bottom: 24px;
            letter-spacing: 1px;
            line-height: 1.2;
        }

        #tech-chart-section {
            position: relative;
            background-image: linear-gradient(rgba(0, 0, 0, 0.40), rgba(0, 0, 0, 0.40)), 
                              url('imagenes/estadio_uc.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            padding: 80px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .tech-chart-container {
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
            background-color: rgba(13, 17, 23, 0.85);
            padding: 30px;
            border: 4px solid #39ff14;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.8);
            display: flex;
            justify-content: center;
            overflow-x: auto;
        }

        @media (max-width: 900px) {
            #sbsr-1475 .cs-container,
            .reviews-container,
            #stability-section .cs-container {
                flex-direction: column;
                gap: 35px;
                text-align: center;
            }

            #sbsr-1475 .cs-title,
            #stability-section .cs-title {
                font-size: 2rem;
            }

            #reviews-306 .cs-image {
                max-width: 100%;
            }
        }
    </style>
</head>
<body>

    <section id="sbsr-1475">
        <div class="cs-container">
            <div class="cs-image-group">
                <picture class="cs-picture">
                    <source media="(max-width: 600px)" srcset="imagenes/charles_uch.jpg">
                    <source media="(min-width: 601px)" srcset="imagenes/charles_uch.jpg">
                    <img loading="lazy" decoding="async" src="imagenes/charles_uch.jpg" alt="Charles Aránguiz" width="542" height="720" aria-hidden="true">
                </picture>
            </div>
            <div class="cs-content">
                <h2 class="cs-title">El gran desequilibrio económico</h2>
                </div>
        </div>
    </section>

    <section id="reviews-306">
        <div class="reviews-container">
            <picture class="cs-image">
                <source media="(max-width: 600px)" srcset="imagenes/grafico_pato.jpg">
                <source media="(min-width: 601px)" srcset="imagenes/grafico_pato.jpg">
                <img aria-hidden="true" loading="lazy" decoding="async" src="imagenes/grafico_pato.jpg" alt="Gráfico Pato" width="842" height="548">
            </picture>
        </div>
    </section>

    <section id="stability-section">
        <div class="cs-container">
            <div class="cs-image-group">
                <picture class="cs-picture">
                    <source media="(max-width: 600px)" srcset="imagenes/gustavo_quinteros.jpg">
                    <source media="(min-width: 601px)" srcset="imagenes/gustavo_quinteros.jpg">
                    <img loading="lazy" decoding="async" src="imagenes/gustavo_quinteros.jpg" alt="Gustavo Quinteros" width="542" height="720" aria-hidden="true">
                </picture>
            </div>
            <div class="cs-content">
                <h2 class="cs-title">la importancia de la estabilidad</h2>
                </div>
        </div>
    </section>

    <section id="tech-chart-section">
        <div class="tech-chart-container">
            <div id="vis-grafico-tecnicos"></div>
        </div>
    </section>

    <script>
        // Carga de la visualización interactiva desde tu archivo JSON
        vegaEmbed('#vis-grafico-tecnicos', 'visualizacion_martin.json').catch(console.error);
    </script>

</body>
</html>
