<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El gran desequilibrio económico</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0b0f12;
            background-image: linear-gradient(rgba(11, 15, 18, 0.85), rgba(11, 15, 18, 0.85)), 
                              url('estadio.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #f5f5f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .header-container {
            max-width: 900px;
            width: 100%;
            text-align: center;
            margin-bottom: 30px;
        }

        .main-title {
            font-size: 3rem;
            font-weight: 900;
            text-transform: uppercase;
            color: #2ecc71;
            background: linear-gradient(180deg, #39ff14 0%, #2ecc71 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1.5px;
            line-height: 1.1;
            text-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
            margin-bottom: 10px;
        }

        .sub-title {
            font-size: 1.8rem;
            font-weight: 700;
            text-transform: uppercase;
            color: #2ecc71;
            background: linear-gradient(180deg, #39ff14 0%, #2ecc71 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1.2px;
            text-shadow: 0 3px 8px rgba(0, 0, 0, 0.5);
        }

        @media (max-width: 768px) {
            .main-title { font-size: 2.2rem; }
            .sub-title { font-size: 1.4rem; }
        }
    </style>
</head>
<body>

    <div class="header-container">
        <h1 class="main-title">El mito de los millones en el fútbol chileno</h1>
        <h2 class="sub-title">El gran desequilibrio económico</h2>
    </div>

    </body>
</html>
